# In-memory H2 for tests — no real DB required
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;NON_KEYWORDS=YEAR
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create the schema from entities instead of running Flyway migrations
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway — migrations use PostgreSQL-specific DDL (TIMESTAMPTZ, BIGSERIAL)
spring.flyway.enabled=false

# Required by WebClientConfig / OpenF1Client
openf1.base-url=https://api.openf1.org/v1

# Suppress noisy cache/devtools output during tests
spring.cache.type=none
spring.devtools.restart.enabled=false
